name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ETL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf

      - name: Parse all financial-report PDFs safely
        run: python etl/run_ingestion_safe.py

      - name: Commit parsed financial-report data
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/data/financial-reports || true
          if git diff --cached --quiet; then
            echo "No parsed financial-report data changes."
          else
            git commit -m "Update parsed Riverhead financial-report data"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build static export
        working-directory: web
        run: |
          npm run build
          touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
