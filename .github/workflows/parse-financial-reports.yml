name: Parse Financial Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Parse financial reports
        run: python etl/parse_financial_reports.py

      - name: Upload parsed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: parsed-financial-reports
          path: web/public/data/financial-reports

      - name: Commit regenerated datasets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add web/public/data/financial-reports || true

          if git diff --cached --quiet; then
            echo "No parsed-data changes detected."
            exit 0
          fi

          git commit -m "Auto-update parsed financial datasets"
          git push
