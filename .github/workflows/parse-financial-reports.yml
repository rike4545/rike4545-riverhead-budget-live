name: Parse Financial Reports

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Parse financial reports
        run: python etl/parse_financial_reports.py

      - name: Upload parsed data artifact
        uses: actions/upload-artifact@v4
        with:
          name: parsed-financial-reports
          path: web/public/data/financial-reports
